name: Agent Build

on:
  push:
    branches: [main]
    paths: [agent/**, .github/workflows/agent.yml]
  pull_request:
    branches: [main]
    paths: [agent/**, .github/workflows/agent.yml]

env:
  GO_VERSION: "1.24"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Test
        working-directory: agent
        run: go test -race -v ./...

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        working-directory: agent
        run: go build -ldflags="-s -w -H windowsgui" -o crosslink-agent.exe .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: crosslink-agent-windows
          path: agent/crosslink-agent.exe

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        working-directory: agent
        run: go build -ldflags="-s -w" -o crosslink-agent .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: crosslink-agent-macos
          path: agent/crosslink-agent

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        working-directory: agent
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o crosslink-agent .
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: crosslink-agent-linux
          path: agent/crosslink-agent
