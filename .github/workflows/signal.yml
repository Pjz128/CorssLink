name: Signal Server CI

on:
  push:
    branches: [main]
    paths: [signal/**, .github/workflows/signal.yml]
  pull_request:
    branches: [main]
    paths: [signal/**, .github/workflows/signal.yml]

env:
  GO_VERSION: "1.24"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Test
        working-directory: signal
        run: go test -race -v ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        working-directory: signal
        run: CGO_ENABLED=0 go build -ldflags="-s -w" -o crosslink-signal .
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: crosslink-signal-linux-amd64
          path: signal/crosslink-signal

  docker:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t crosslink-signal -f signal/Dockerfile .
      # TODO: push to registry when ready
