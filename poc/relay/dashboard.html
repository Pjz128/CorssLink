<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossLink Dashboard</title>
<style>
  :root {
    --bg-deep: #0A0B0F;
    --bg-elevated: #12141C;
    --bg-panel: #1A1D28;
    --bg-card: #161822;
    --accent-cyan: #00E5FF;
    --accent-blue: #2979FF;
    --accent-purple: #7C4DFF;
    --gradient: linear-gradient(135deg, var(--accent-cyan), var(--accent-purple));
    --success: #00E676;
    --warn: #FFC107;
    --error: #FF5252;
    --text: rgba(255,255,255,0.9);
    --text2: rgba(255,255,255,0.7);
    --text3: rgba(255,255,255,0.5);
    --border: rgba(255,255,255,0.08);
    --radius: 14px;
    --radius-sm: 10px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    background: linear-gradient(135deg, var(--bg-deep), var(--bg-elevated));
    color: var(--text); min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 28px;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    position: sticky; top: 0; z-index: 10;
    background: rgba(10,11,15,0.88);
  }
  .logo { display: flex; align-items: center; gap: 10px; font-size: 18px; font-weight: 700; }
  .logo-icon {
    width: 32px; height: 32px;
    background: var(--gradient); border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 14px;
  }
  .logo-accent { background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .badge {
    background: rgba(0,229,255,0.12);
    color: var(--accent-cyan); font-size: 11px; font-weight: 600;
    padding: 4px 10px; border-radius: 16px; border: 1px solid rgba(0,229,255,0.2);
  }
  .badge-admin {
    background: rgba(124,77,255,0.15);
    color: var(--accent-purple); border-color: rgba(124,77,255,0.3);
  }
  .user-menu { display: flex; align-items: center; gap: 10px; }
  .user-label { font-size: 13px; color: var(--text2); }

  /* ── Main ── */
  .main { max-width: 900px; margin: 0 auto; padding: 24px 20px; }
  .section-title {
    font-size: 12px; font-weight: 600; color: var(--text3);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px;
  }

  /* ── Agent Cards ── */
  .agents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }
  .agent-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 18px;
    transition: all 0.25s ease; position: relative; overflow: hidden;
  }
  .agent-card::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(0,229,255,0.06), transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }
  .agent-card:hover {
    border-color: rgba(0,229,255,0.35);
    transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(0,229,255,0.08);
  }
  .agent-card:hover::before { opacity: 1; }
  .agent-card.clickable { cursor: pointer; }
  .card-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 10px; position: relative; z-index: 1;
  }
  .status-dot {
    width: 7px; height: 7px; min-width: 7px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 6px rgba(0,230,118,0.5);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100%{box-shadow:0 0 4px rgba(0,230,118,0.4)}
    50%{box-shadow:0 0 12px rgba(0,230,118,0.8)}
  }
  .peer-name { font-size: 14px; font-weight: 600; color: var(--text); word-break: break-all; }
  .card-meta { font-size: 11px; color: var(--text3); position: relative; z-index: 1; }
  .card-actions {
    margin-top: 12px; display: flex; gap: 8px; flex-wrap: wrap;
    position: relative; z-index: 1;
  }
  .owner-badge {
    font-size: 11px; font-weight: 600;
    padding: 3px 8px; border-radius: 12px;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .owner-yours { background: rgba(0,229,255,0.1); color: var(--accent-cyan); }
  .owner-other { background: rgba(255,255,255,0.05); color: var(--text3); }
  .owner-none { color: var(--text3); font-size: 11px; }
  .btn-sm {
    padding: 5px 12px; border-radius: 14px;
    font-size: 11px; font-weight: 600; cursor: pointer;
    border: none; transition: all 0.2s; font-family: inherit;
  }
  .btn-claim { background: rgba(0,230,118,0.15); color: var(--success); }
  .btn-claim:hover { background: rgba(0,230,118,0.25); }
  .btn-unclaim { background: rgba(255,255,255,0.06); color: var(--text3); }
  .btn-unclaim:hover { background: rgba(255,82,82,0.15); color: var(--error); }
  .btn-qr {
    background: rgba(0,229,255,0.1); color: var(--accent-cyan);
    font-size: 11px; cursor: pointer;
  }
  .btn-qr:hover { background: rgba(0,229,255,0.2); }

  /* ── Visibility Toggle ── */
  .visibility-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; }
  .toggle-switch { position: relative; width: 40px; height: 22px; display: inline-block; }
  .toggle-switch input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.12); border-radius: 22px; transition: 0.3s;
  }
  .toggle-slider:before {
    content: ""; position: absolute; height: 16px; width: 16px;
    left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: 0.3s;
  }
  input:checked + .toggle-slider { background: var(--accent-cyan); }
  input:checked + .toggle-slider:before { transform: translateX(18px); }
  .vis-label-public { color: var(--success); font-size: 11px; }
  .vis-label-private { color: var(--text3); font-size: 11px; }

  /* ── Connection Requests ── */
  .req-list { display: flex; flex-direction: column; gap: 8px; }
  .req-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 10px;
  }
  .req-info { flex: 1; min-width: 200px; }
  .req-from { font-weight: 600; font-size: 14px; }
  .req-meta { font-size: 12px; color: var(--text3); margin-top: 4px; }
  .req-actions { display: flex; gap: 8px; }
  .btn-approve { background: rgba(0,230,118,0.15); color: var(--success); }
  .btn-approve:hover { background: rgba(0,230,118,0.3); }
  .btn-reject { background: rgba(255,82,82,0.1); color: var(--error); }
  .btn-reject:hover { background: rgba(255,82,82,0.25); }
  .pending-badge {
    background: rgba(255,193,7,0.12); color: var(--warn);
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
  }

  /* ── Empty State ── */
  .empty-state { text-align: center; padding: 60px 20px; display: none; }
  .empty-icon {
    width: 80px; height: 80px; margin: 0 auto 20px;
    background: var(--bg-panel); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
  }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: var(--text3); }

  /* ── Login Overlay ── */
  .login-overlay {
    display: none;
    position: fixed; inset: 0;
    background: linear-gradient(135deg, var(--bg-deep), var(--bg-elevated));
    z-index: 200; align-items: center; justify-content: center;
  }
  .login-overlay.active { display: flex; }
  .login-card {
    background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 32px;
    width: 340px; max-width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .login-input {
    display: block; width: 100%; padding: 10px 14px; margin-bottom: 12px;
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); color: var(--text); font-size: 14px;
    font-family: inherit; outline: none; transition: border-color 0.2s;
  }
  .login-input:focus { border-color: var(--accent-cyan); }
  .btn-full { width: 100%; padding: 10px; font-size: 14px; }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(8px);
    z-index: 100; align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal-card {
    background: var(--bg-panel); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 28px;
    text-align: center; max-width: 360px; width: 90%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.3s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.95) translateY(10px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .modal-peer { font-size: 12px; color: var(--accent-cyan); margin-bottom: 18px; word-break: break-all; }
  .qr-wrapper {
    background: white; border-radius: 12px; padding: 14px;
    display: inline-block; margin-bottom: 18px; line-height: 0;
  }
  .qr-wrapper img { width: 200px; height: 200px; image-rendering: pixelated; }
  .qr-loading {
    width: 200px; height: 200px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text3); font-size: 13px;
  }
  .btn-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  .btn {
    padding: 9px 18px; border-radius: var(--radius-sm);
    font-size: 13px; font-weight: 600; cursor: pointer;
    border: none; transition: all 0.2s; font-family: inherit;
  }
  .btn-primary { background: var(--accent-blue); color: white; }
  .btn-primary:hover { background: #448AFF; }
  .btn-secondary {
    background: rgba(255,255,255,0.08); color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-secondary:hover { background: rgba(255,255,255,0.14); }
  .btn-danger { background: rgba(255,82,82,0.15); color: var(--error); }
  .btn-danger:hover { background: rgba(255,82,82,0.25); }

  /* ── Admin Panel ── */
  .admin-panel { margin-top: 32px; }
  .user-table { width: 100%; border-collapse: collapse; margin-bottom: 16px; }
  .user-table th, .user-table td {
    text-align: left; padding: 10px 12px;
    font-size: 13px; border-bottom: 1px solid var(--border);
  }
  .user-table th { color: var(--text3); font-weight: 600; font-size: 11px; text-transform: uppercase; }
  .user-table td { color: var(--text2); }
  .new-user-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; }
  .new-user-form .login-input { flex: 1; min-width: 100px; margin-bottom: 0; }
  .new-user-form label { font-size: 11px; color: var(--text3); display: flex; align-items: center; gap: 4px; white-space: nowrap; }

  /* ── Toast ── */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    padding: 8px 20px; border-radius: 20px;
    font-size: 13px; font-weight: 500; z-index: 300; display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    animation: toastIn 0.3s ease;
  }
  .toast-ok { background: var(--success); color: #000; }
  .toast-err { background: var(--error); color: white; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(10px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  @media (max-width: 600px) {
    .header { padding: 14px 16px; }
    .main { padding: 18px 12px; }
    .agents-grid { grid-template-columns: 1fr; }
    .modal-card, .login-card { padding: 20px; }
    .new-user-form { flex-direction: column; }
    .new-user-form .login-input { min-width: auto; }
    .downloads-grid { grid-template-columns: 1fr; }
  }

  /* ── Download Section ── */
  .downloads-section { margin-top: 32px; }
  .downloads-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }
  .download-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px;
    display: flex; align-items: center; gap: 14px;
    transition: all 0.25s ease;
  }
  .download-card:hover {
    border-color: rgba(0,229,255,0.35);
    box-shadow: 0 8px 32px rgba(0,229,255,0.06);
  }
  .download-icon { font-size: 28px; min-width: 40px; text-align: center; }
  .download-info { flex: 1; min-width: 0; }
  .download-label { font-size: 14px; font-weight: 600; color: var(--text); }
  .download-desc { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .download-actions { display: flex; gap: 6px; align-items: center; }
</style>
</head>
<body>

<!-- Login Overlay -->
<div id="loginOverlay" class="login-overlay active">
  <div class="login-card">
    <div style="text-align:center;margin-bottom:20px">
      <div class="logo-icon" style="display:inline-flex">◈</div>
    </div>
    <div class="modal-title" style="margin-bottom:4px">CrossLink 登录</div>
    <div style="color:var(--text3);font-size:12px;margin-bottom:20px;text-align:center">输入凭据以访问管理面板</div>
    <input id="loginUser" class="login-input" type="text" placeholder="用户名" autocomplete="username">
    <input id="loginPass" class="login-input" type="password" placeholder="密码" autocomplete="current-password">
    <div id="loginError" style="color:var(--error);font-size:12px;margin-bottom:12px;display:none"></div>
    <button class="btn btn-primary btn-full" onclick="doLogin()">登 录</button>
  </div>
</div>

<!-- Header -->
<header class="header">
  <div class="logo">
    <div class="logo-icon">◈</div>
    <span>CrossLink <span class="logo-accent">Dashboard</span></span>
  </div>
  <div style="display:flex;align-items:center;gap:12px">
    <span id="agentCount" class="badge">—</span>
    <span id="userMenu" class="user-menu" style="display:none">
      <span class="user-label" id="currentUserLabel"></span>
      <span id="adminBadge" class="badge badge-admin" style="display:none">管理员</span>
      <button class="btn-sm btn-unclaim" onclick="doLogout()">退出</button>
    </span>
  </div>
</header>

<!-- Main Content -->
<main class="main">
  <div class="section-title">在线设备</div>
  <div id="agentsGrid" class="agents-grid"></div>
  <div id="emptyState" class="empty-state">
    <div class="empty-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5">
        <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
      </svg>
    </div>
    <div class="empty-title">还没有 Agent</div>
    <div class="empty-sub">点击下方「部署我的 Agent」下载并运行，自动连接上线</div>
    <div style="margin-top:16px">
      <a href="/api/deploy/windows" download class="btn btn-primary" style="text-decoration:none;font-size:14px">
        💻 部署我的 Agent
      </a>
    </div>
  </div>

  <!-- Connection Requests -->
  <div id="requestsSection" style="display:none">
    <div class="section-title">
      建联申请
      <span id="pendingCount" class="pending-badge" style="margin-left:8px"></span>
    </div>
    <div id="requestsList" class="req-list"></div>
    <div id="noRequests" style="text-align:center;padding:20px;color:var(--text3);font-size:13px">暂无待处理的建联申请</div>
  </div>

  <!-- Deploy Section -->
  <div id="downloadsSection" class="downloads-section">
    <div class="section-title">部署客户端</div>
    <div class="downloads-grid">
      <div class="download-card" style="border-color: rgba(0,229,255,0.3);background:rgba(0,229,255,0.03)">
        <div class="download-icon">💻</div>
        <div class="download-info">
          <div class="download-label">我的 Windows Agent</div>
          <div class="download-desc" id="winInfo">一键部署 · 自动归属 · 即下即用</div>
        </div>
        <div class="download-actions">
          <a id="winDeploy" class="btn btn-primary btn-sm" href="/api/deploy/windows" download style="text-decoration:none">
            部署我的 Agent
          </a>
        </div>
      </div>
      <div class="download-card">
        <div class="download-icon">📱</div>
        <div class="download-info">
          <div class="download-label">Android APK</div>
          <div class="download-desc" id="apkInfo">手机扫码下载安装</div>
        </div>
        <div class="download-actions">
          <a id="apkDownload" class="btn btn-primary btn-sm" href="/api/download/android/crosslink.apk" download style="text-decoration:none">
            下载 APK
          </a>
          <button class="btn-sm btn-qr" onclick="showAPKQR()">扫码</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Admin Panel -->
  <div id="adminPanel" class="admin-panel" style="display:none">
    <div class="section-title">用户管理</div>
    <table class="user-table">
      <thead><tr><th>用户名</th><th>角色</th><th>创建者</th><th>操作</th></tr></thead>
      <tbody id="userTableBody"></tbody>
    </table>
    <div class="new-user-form">
      <input id="newUsername" class="login-input" type="text" placeholder="新用户名">
      <input id="newPassword" class="login-input" type="password" placeholder="新密码">
      <label style="margin-bottom:0;padding-bottom:4px">
        <input type="checkbox" id="newIsAdmin"> 管理员
      </label>
      <button class="btn btn-primary btn-sm" onclick="createUser()">创建用户</button>
    </div>
  </div>
</main>

<!-- QR Modal -->
<div id="qrModal" class="modal-overlay" onclick="closeQR(event)">
  <div class="modal-card" onclick="event.stopPropagation()">
    <div class="modal-title">扫码配对</div>
    <div id="modalPeer" class="modal-peer"></div>
    <div class="qr-wrapper">
      <div id="qrImage"><div class="qr-loading">加载中…</div></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="copyPairURL()">复制配对链接</button>
      <button class="btn btn-secondary" onclick="closeQR()">关闭</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>

<script>
let currentUser = null;
let refreshTimer = null;

// ── Init ──
checkAuth();

async function checkAuth() {
  try {
    const res = await fetch('/api/auth/me');
    if (res.ok) {
      currentUser = await res.json();
      showAuthenticated();
    } else {
      showLogin();
    }
  } catch (err) {
    showLogin();
  }
}

function showLogin() {
  document.getElementById('loginOverlay').classList.add('active');
  document.getElementById('userMenu').style.display = 'none';
  document.getElementById('agentsGrid').innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('agentCount').textContent = '—';
}

function showAuthenticated() {
  document.getElementById('loginOverlay').classList.remove('active');
  document.getElementById('userMenu').style.display = 'flex';
  document.getElementById('currentUserLabel').textContent = currentUser.username;
  document.getElementById('requestsSection').style.display = 'block';
  if (currentUser.isAdmin) {
    document.getElementById('adminBadge').style.display = 'inline';
    document.getElementById('adminPanel').style.display = 'block';
    fetchAdminUsers();
  }
  fetchAgents();
  fetchConnectionRequests();
  loadManifest();
  if (refreshTimer) clearInterval(refreshTimer);
  refreshTimer = setInterval(() => { fetchAgents(); fetchConnectionRequests(); }, 5000);
}

// ── Login ──
async function doLogin() {
  const username = document.getElementById('loginUser').value.trim();
  const password = document.getElementById('loginPass').value;
  const errEl = document.getElementById('loginError');
  if (!username || !password) {
    errEl.textContent = '请输入用户名和密码';
    errEl.style.display = 'block';
    return;
  }
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password})
    });
    if (!res.ok) {
      errEl.textContent = '用户名或密码错误';
      errEl.style.display = 'block';
      return;
    }
    currentUser = await res.json();
    errEl.style.display = 'none';
    document.getElementById('loginPass').value = '';
    showAuthenticated();
  } catch (err) {
    errEl.textContent = '网络错误';
    errEl.style.display = 'block';
  }
}

async function doLogout() {
  try { await fetch('/api/auth/logout', {method: 'POST'}); } catch(_) {}
  currentUser = null;
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  showLogin();
}

// Enter to login
document.getElementById('loginPass').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

// ── Agents ──
async function fetchAgents() {
  try {
    const res = await fetch('/api/dashboard/agents');
    if (!res.ok) {
      if (res.status === 401) { doLogout(); return; }
      throw new Error(res.status);
    }
    const data = await res.json();
    renderAgents(data.agents || []);
  } catch (err) {
    console.error('fetch agents:', err);
  }
}

function renderAgents(agents) {
  const grid = document.getElementById('agentsGrid');
  const empty = document.getElementById('emptyState');
  const badge = document.getElementById('agentCount');

  badge.textContent = agents.length + ' agent' + (agents.length !== 1 ? 's' : '');

  if (agents.length === 0) {
    grid.style.display = 'none';
    empty.style.display = 'block';
    return;
  }
  grid.style.display = '';
  empty.style.display = 'none';

  grid.innerHTML = agents.map(a => {
    const elapsed = timeAgo(a.connectedAt);
    const isMine = currentUser && a.owner === currentUser.username;
    const claimed = a.claimed && a.owner;
    const isAdminView = currentUser && currentUser.isAdmin;

    let ownerHTML = '';
    let actionHTML = '';

    if (!claimed) {
      ownerHTML = '<span class="owner-none">未认领</span>';
      actionHTML = `<button class="btn-sm btn-claim" onclick="event.stopPropagation();claimAgent('${esc(a.peerID)}')">认领</button>`;
    } else if (isMine) {
      ownerHTML = `<span class="owner-badge owner-yours">✓ 我的设备</span>`;
      const vis = a.visibility || 'private';
      const visChecked = vis === 'public' ? ' checked' : '';
      const visLabel = vis === 'public'
        ? '<span class="vis-label-public">🔓 公开</span>'
        : '<span class="vis-label-private">🔒 私有</span>';
      actionHTML = `
        <div class="visibility-row">
          <label class="toggle-switch" onclick="event.stopPropagation()">
            <input type="checkbox"${visChecked} onchange="setVisibility('${esc(a.peerID)}', this.checked)">
            <span class="toggle-slider"></span>
          </label>
          ${visLabel}
        </div>
        <button class="btn-sm btn-unclaim" onclick="event.stopPropagation();unclaimAgent('${esc(a.peerID)}')">取消认领</button>
      `;
    } else {
      ownerHTML = `<span class="owner-badge owner-other">${esc(a.owner)} 的设备</span>`;
      if (isAdminView) {
        actionHTML = `<button class="btn-sm btn-unclaim" onclick="event.stopPropagation();unclaimAgent('${esc(a.peerID)}')">强制取消</button>`;
      }
    }

    // Only show QR button if user owns the agent
    const qrHTML = isMine || (!claimed && currentUser) || (isAdminView && claimed)
      ? `<button class="btn-sm btn-qr" onclick="event.stopPropagation();showQR('${esc(a.peerID)}')">📱 生成二维码</button>`
      : '';

    return `
      <div class="agent-card${isMine ? ' clickable' : ''}" ${isMine ? `onclick="showQR('${esc(a.peerID)}')"` : ''}>
        <div class="card-header">
          <div class="status-dot"></div>
          <div class="peer-name">${esc(a.peerID)}</div>
        </div>
        <div class="card-meta">🕐 ${elapsed}</div>
        <div class="card-actions">
          ${ownerHTML}
          ${actionHTML}
          ${qrHTML}
        </div>
      </div>`;
  }).join('');
}

// ── Claim / Unclaim ──
async function claimAgent(peerID) {
  try {
    const res = await fetch('/api/dashboard/claim?peer=' + encodeURIComponent(peerID), {method: 'POST'});
    if (!res.ok) {
      const err = await res.json();
      showToast('认领失败: ' + err.error, true);
      return;
    }
    showToast('认领成功', false);
    fetchAgents();
  } catch (err) { showToast('网络错误', true); }
}

async function unclaimAgent(peerID) {
  try {
    const res = await fetch('/api/dashboard/unclaim?peer=' + encodeURIComponent(peerID), {method: 'POST'});
    if (!res.ok) {
      const err = await res.json();
      showToast('取消失败: ' + err.error, true);
      return;
    }
    showToast('已取消认领', false);
    fetchAgents();
  } catch (err) { showToast('网络错误', true); }
}

// ── Visibility ──
async function setVisibility(peerID, isPublic) {
  const vis = isPublic ? 'public' : 'private';
  try {
    const res = await fetch('/api/dashboard/agents/' + encodeURIComponent(peerID) + '/visibility', {
      method: 'PUT',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({visibility: vis})
    });
    if (!res.ok) {
      const err = await res.json();
      showToast('设置失败: ' + err.error, true);
      fetchAgents(); // revert
      return;
    }
    showToast(isPublic ? '已设为公开' : '已设为私有', false);
  } catch (err) { showToast('网络错误', true); fetchAgents(); }
}

// ── Connection Requests ──
async function fetchConnectionRequests() {
  try {
    const res = await fetch('/api/dashboard/requests');
    if (!res.ok) return;
    const data = await res.json();
    renderRequests(data.incoming || []);
  } catch (_) {}
}

function renderRequests(requests) {
  const section = document.getElementById('requestsSection');
  const list = document.getElementById('requestsList');
  const empty = document.getElementById('noRequests');
  const badge = document.getElementById('pendingCount');

  if (requests.length === 0) {
    list.innerHTML = '';
    empty.style.display = 'block';
    badge.textContent = '';
    if (!currentUser || !currentUser.isAdmin) {
      // Show section for all logged-in users who have agents
    }
    return;
  }

  section.style.display = 'block';
  empty.style.display = 'none';
  badge.textContent = requests.length + ' 待处理';

  list.innerHTML = requests.map(r => `
    <div class="req-card">
      <div class="req-info">
        <div class="req-from">📱 ${esc(r.fromDevice)} 请求连接 ${esc(r.peerID)}</div>
        <div class="req-meta">${timeAgo(r.createdAt)} · 状态: 待审批</div>
      </div>
      <div class="req-actions">
        <button class="btn-sm btn-approve" onclick="approveRequest('${esc(r.requestId)}')">✓ 批准</button>
        <button class="btn-sm btn-reject" onclick="rejectRequest('${esc(r.requestId)}')">✗ 拒绝</button>
      </div>
    </div>
  `).join('');
}

async function approveRequest(requestId) {
  try {
    const res = await fetch('/api/dashboard/requests/' + encodeURIComponent(requestId) + '/approve', {method: 'POST'});
    if (!res.ok) {
      const err = await res.json();
      showToast('操作失败: ' + err.error, true);
      return;
    }
    showToast('已批准建联申请', false);
    fetchConnectionRequests();
  } catch (err) { showToast('网络错误', true); }
}

async function rejectRequest(requestId) {
  try {
    const res = await fetch('/api/dashboard/requests/' + encodeURIComponent(requestId) + '/reject', {method: 'POST'});
    if (!res.ok) {
      const err = await res.json();
      showToast('操作失败: ' + err.error, true);
      return;
    }
    showToast('已拒绝建联申请', false);
    fetchConnectionRequests();
  } catch (err) { showToast('网络错误', true); }
}

// ── QR ──
async function showQR(peerID) {
  const modal = document.getElementById('qrModal');
  document.getElementById('modalPeer').textContent = peerID;
  document.getElementById('qrImage').innerHTML = '<div class="qr-loading">加载中…</div>';
  modal.classList.add('active');

  try {
    const res = await fetch('/api/dashboard/qr?peer=' + encodeURIComponent(peerID));
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || '请求失败');
    }
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    document.getElementById('qrImage').innerHTML = `<img src="${url}" alt="QR Code">`;
  } catch (err) {
    document.getElementById('qrImage').innerHTML =
      `<div class="qr-loading" style="color:var(--error)">${esc(err.message)}</div>`;
  }
}

function closeQR(e) {
  if (e && e.target !== document.getElementById('qrModal')) return;
  document.getElementById('qrModal').classList.remove('active');
}

// ── APK Download QR ──
function showAPKQR() {
  const modal = document.getElementById('qrModal');
  document.getElementById('modalPeer').textContent = '下载 Android APK';
  document.getElementById('qrImage').innerHTML = '<div class="qr-loading">加载中…</div>';
  modal.classList.add('active');
  // Load QR from server
  fetch('/api/dashboard/qr-apk')
    .then(r => { if (!r.ok) throw new Error('failed'); return r.blob(); })
    .then(blob => {
      const url = URL.createObjectURL(blob);
      document.getElementById('qrImage').innerHTML = `<img src="${url}" alt="APK QR">`;
    })
    .catch(() => {
      document.getElementById('qrImage').innerHTML =
        '<div class="qr-loading" style="color:var(--error)">生成失败</div>';
    });
}

// ── Manifest loader ──
async function loadManifest() {
  try {
    const res = await fetch('/api/downloads');
    if (!res.ok) return;
    const m = await res.json();
    const win = m.platforms?.windows?.files?.[0];
    const apk = m.platforms?.android?.files?.[0];
    if (win && win.size) document.getElementById('winInfo').textContent =
      `ollama-agent + 启动脚本 (${formatSize(win.size)})`;
    if (apk && apk.size) document.getElementById('apkInfo').textContent =
      `CrossLink 手机客户端 (${formatSize(apk.size)})`;
  } catch(e) {}
}

function formatSize(b) {
  if (b > 1048576) return (b/1048576).toFixed(1) + ' MB';
  if (b > 1024) return (b/1024).toFixed(1) + ' KB';
  return b + ' B';
}

async function copyPairURL() {
  const peerID = document.getElementById('modalPeer').textContent;
  try {
    const res = await fetch('/api/dashboard/agents');
    const data = await res.json();
    const agent = (data.agents || []).find(a => a.peerID === peerID);
    if (!agent) { showToast('设备已离线', true); return; }
    const url = window.location.protocol + '//' + window.location.host + '/pair?token=' + agent.pairToken;
    await navigator.clipboard.writeText(url);
    showToast('已复制到剪贴板', false);
  } catch (err) {
    showToast('复制失败: ' + err.message, true);
  }
}

// ── Admin: Users ──
async function fetchAdminUsers() {
  try {
    const res = await fetch('/api/admin/users');
    if (!res.ok) return;
    const data = await res.json();
    renderUsers(data.users || []);
  } catch (err) { console.error('fetch users:', err); }
}

function renderUsers(users) {
  const tbody = document.getElementById('userTableBody');
  tbody.innerHTML = users.map(u =>
    `<tr>
      <td>${esc(u.username)}</td>
      <td>${u.isAdmin ? '<span class="badge badge-admin" style="font-size:10px">管理员</span>' : '用户'}</td>
      <td style="color:var(--text3)">${esc(u.createdBy)}</td>
      <td>
        ${u.username !== (currentUser && currentUser.username)
          ? `<button class="btn-sm btn-unclaim" onclick="deleteUser('${esc(u.username)}')">删除</button>`
          : '<span style="font-size:11px;color:var(--text3)">当前用户</span>'}
      </td>
    </tr>`
  ).join('');
}

async function createUser() {
  const username = document.getElementById('newUsername').value.trim();
  const password = document.getElementById('newPassword').value;
  const isAdmin = document.getElementById('newIsAdmin').checked;
  if (!username || !password) { showToast('请输入用户名和密码', true); return; }
  try {
    const res = await fetch('/api/admin/users', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({username, password, isAdmin})
    });
    if (!res.ok) {
      const err = await res.json();
      showToast(err.error, true);
      return;
    }
    document.getElementById('newUsername').value = '';
    document.getElementById('newPassword').value = '';
    document.getElementById('newIsAdmin').checked = false;
    showToast('用户创建成功', false);
    fetchAdminUsers();
  } catch (err) { showToast('网络错误', true); }
}

async function deleteUser(username) {
  if (!confirm('确定删除用户 ' + username + '？')) return;
  try {
    const res = await fetch('/api/admin/users/' + encodeURIComponent(username), {method: 'DELETE'});
    if (!res.ok) {
      const err = await res.json();
      showToast(err.error, true);
      return;
    }
    showToast('用户已删除', false);
    fetchAdminUsers();
  } catch (err) { showToast('网络错误', true); }
}

// ── Keyboard ──
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.getElementById('qrModal').classList.remove('active');
  }
});

// ── Helpers ──
function timeAgo(iso) {
  const diff = Date.now() - new Date(iso).getTime();
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return sec + 's 前';
  const min = Math.floor(sec / 60);
  if (min < 60) return min + 'm 前';
  const hr = Math.floor(min / 60);
  if (hr < 24) return hr + 'h 前';
  return Math.floor(hr / 24) + 'd 前';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

let toastTimer;
function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (isError ? 'toast-err' : 'toast-ok');
  t.style.display = 'block';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = 'none'; }, 3000);
}
</script>
