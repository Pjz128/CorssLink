<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12141C"/>
      <stop offset="100%" stop-color="#0A0B0F"/>
    </linearGradient>
    <linearGradient id="linkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00E5FF"/>
      <stop offset="55%" stop-color="#2979FF"/>
      <stop offset="100%" stop-color="#7C4DFF"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- 外圈光晕 -->
  <rect x="32" y="32" width="448" height="448" rx="80" fill="none" stroke="url(#linkGrad)" stroke-width="2" opacity="0.35" filter="url(#softGlow)"/>

  <!-- 终端窗口 -->
  <rect x="88" y="116" width="336" height="240" rx="24" fill="#1A1D28" stroke="#2A2E3D" stroke-width="2"/>
  <!-- 终端标题栏 -->
  <rect x="88" y="116" width="336" height="44" rx="24" fill="#222636"/>
  <rect x="88" y="140" width="336" height="20" fill="#222636"/>
  <circle cx="118" cy="138" r="6" fill="#FF5252"/>
  <circle cx="140" cy="138" r="6" fill="#FFB300"/>
  <circle cx="162" cy="138" r="6" fill="#00E676"/>

  <!-- 终端内容：prompt -->
  <text x="116" y="198" font-family="monospace" font-size="38" font-weight="600" fill="#00E5FF" filter="url(#glow)">
    &gt;_
  </text>
  <rect x="180" y="176" width="180" height="10" rx="5" fill="#2979FF" opacity="0.5"/>
  <rect x="116" y="224" width="140" height="8" rx="4" fill="#FFFFFF" opacity="0.2"/>
  <rect x="116" y="244" width="210" height="8" rx="4" fill="#FFFFFF" opacity="0.12"/>
  <rect x="116" y="264" width="170" height="8" rx="4" fill="#FFFFFF" opacity="0.08"/>

  <!-- 连接符号：从终端窗口右下延伸到右下角节点 -->
  <path d="M 360 320 C 360 380, 300 390, 260 390" fill="none" stroke="url(#linkGrad)" stroke-width="8" stroke-linecap="round" filter="url(#glow)"/>
  <circle cx="260" cy="390" r="18" fill="#0A0B0F" stroke="#00E5FF" stroke-width="4" filter="url(#glow)"/>
  <circle cx="260" cy="390" r="7" fill="#00E5FF"/>

  <!-- 远端节点 -->
  <circle cx="380" cy="390" r="26" fill="#0A0B0F" stroke="url(#linkGrad)" stroke-width="5" filter="url(#glow)"/>
  <circle cx="380" cy="390" r="10" fill="#00E5FF"/>

  <!-- 链路光线 -->
  <line x1="278" y1="390" x2="354" y2="390" stroke="url(#linkGrad)" stroke-width="5" stroke-linecap="round" opacity="0.9" filter="url(#glow)"/>
</svg>
